<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  </head>
  <body>
    <div class="form-container">
      <h1>LA MODA, DEMANDA ESTAR ACTUALIZADO!</h1>
      <div>
        <button class="btn-selection" id="mostrar-inicio">
          Iniciar sesion
        </button>
        <button class="btn-selection" id="mostrar-registrar">
          Registrarse
        </button>
      </div>
      <div id="iniciar-sesion">
        <form action="../../index.html" class="form">
          <label for="email">Correo</label>
          <input
            type="email"
            name="email-switch"
            id="email-switch"
            required
            />
          <div class="password-container">
          <label for="password-switch">Contraseña</label>
          <div class="input-wrapper">
          <img
            src="../img/iconForm/close.png"
            class="icon-password icon-password-switch"
            id="closePassSwitch"
            alt=""
          />
          <input
            type="password"
            name="password-switch"
            id="password-switch"
            class="show-password"
            required
          />
          </div>
          </div>
          <i class="bx bx-shoyw-alt" style="background-color: #111"></i>
          <div class="forgot-password">
            <a href="#">¿Olvidaste tu contraseña?</a>
          </div>
          <input
            type="submit"
            class="btn-enviar"
            name="iniciar-sesion"
            id="btn-iniciar-sesion"
            value="Iniciar sesion"
          />
        </form>
      </div>
      <div class=" registrarse" id="registrarse">
        <form action="../../index.html" class="form" id="form-logging">
          <label for="name">Nombre</label>
          <input
            type="text"
            name="name"
            id="name-login"
            title="Solo letras y espacios, mínimo 2 caracteres y máximo 50"
            required
          />
          <label for="email">Correo</label>
          <input
            type="email"
            name="email-login"
            id="email-login"
            required
          />
          <div class="password-container">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
          <img
            src="../img/iconForm/close.png"
            class="icon-password"
            id="closePass"
            alt=""
          />
          
          <input
            type="password"
            name="password-login"
            id="password-login"
            class="show-password"
            required
          />
          </div>
        
          </div>
          <div class="password-container">
          <label for="confirm-password">Confirmar contraseña</label>
          <div class="input-wrapper">
          <img
            src="../img/iconForm/close.png"
            class="icon-password position-confirm-pass"
            id="closePassConfirm"
            alt=""
          />
          <input
            type="password"
            name="confirm-password-login"
            id="confirm-password-login"
            class="show-password"
            required
          />
          </div>
          </div>

          <input
            type="submit"
            class="btn-enviar"
            name="Registrarse"
            id="btn-Registrarse"
            value="Registrarse"
          />
        </form>
      </div>
    </div>
    <script type="module" src="js/form.js"></script>
  </body>
</html>
